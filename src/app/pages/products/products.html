<div class="products-page">
  <!-- Header -->
  <div class="page-header">
    <div class="header-container">
      <h1>{{ selectedCategory ? selectedCategory : 'Todos los productos' }}</h1>
      <span class="product-count">{{ filteredProducts.length }} productos</span>
    </div>
  </div>

  <div class="page-container">
    <!-- Filtros -->
    <aside class="filters" [class.show]="showFilters">
      <div class="filter-section">
        <h3>Categorías</h3>
        <ul class="category-list">
          <li *ngFor="let cat of categories">
            <button
              (click)="selectCategory(cat.slug)"
              [class.active]="selectedCategory === cat.slug">
              {{ cat.name }}
            </button>
          </li>
        </ul>
      </div>

      <div class="filter-section">
        <h3>Precio</h3>
        <div class="price-range">
          <div class="price-inputs">
            <div class="price-input-group">
              <label>Min</label>
              <input 
                type="number" 
                [(ngModel)]="selectedMinPrice"
                (ngModelChange)="onPriceChange()"
                [min]="minPrice"
                [max]="selectedMaxPrice">
            </div>
            <span class="price-separator">-</span>
            <div class="price-input-group">
              <label>Max</label>
              <input 
                type="number" 
                [(ngModel)]="selectedMaxPrice"
                (ngModelChange)="onPriceChange()"
                [min]="selectedMinPrice"
                [max]="maxPrice">
            </div>
          </div>
          <button class="reset-filters" (click)="resetFilters()">Limpiar</button>
        </div>
      </div>
    </aside>

    <!-- Productos -->
    <div class="products-main">
      <!-- Búsqueda y filtros toggle -->
      <div class="search-controls">
        <div class="search-container">
          <div class="search-bar">
            <input
              type="text"
              [(ngModel)]="search"
              (keyup.enter)="onSearch()"
              (focus)="onSearchFocus()"
              (blur)="onSearchBlur()"
              placeholder="Buscar productos..."/>
            <button (click)="onSearch()">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
            </button>
          </div>
          
          <!-- Historial de búsqueda -->
          <div class="search-history" *ngIf="showSearchHistory && searchHistory.length > 0">
            <div class="history-header">
              <span>Búsquedas recientes</span>
              <button class="clear-history" (click)="clearSearchHistory()">Limpiar</button>
            </div>
            <ul class="history-list">
              <li *ngFor="let term of searchHistory" (click)="selectHistoryItem(term)">
                <span class="history-icon">🕐</span>
                <span class="history-term">{{ term }}</span>
                <button class="remove-term" (click)="removeHistoryItem($event, term)">✕</button>
              </li>
            </ul>
          </div>
        </div>

        <button class="filter-toggle-btn" (click)="toggleFilters()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
          </svg>
          Filtros
        </button>
      </div>

      <!-- Grid -->
      <div class="products-grid" *ngIf="!loading && filteredProducts.length > 0">
        <app-product-card *ngFor="let product of filteredProducts" [product]="product"></app-product-card>
      </div>

      <!-- Sin resultados -->
      <div class="empty-state" *ngIf="!loading && filteredProducts.length === 0">
        <p>No se encontraron productos</p>
        <button (click)="selectedCategory = ''; search = ''; resetFilters(); loadProducts()">Ver todos</button>
      </div>

      <!-- Loading -->
      <div class="loading-state" *ngIf="loading">
        <p>Cargando productos...</p>
      </div>
    </div>
  </div>
</div>
