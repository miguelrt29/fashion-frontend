<div class="auth-page">
  <div class="auth-left">
    <div class="auth-brand">
      <a routerLink="/" class="auth-logo">Fashion<span>Store</span></a>
      <p>La moda que te define, al alcance de tus manos.</p>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-form-container">
      <h1>Iniciar sesión</h1>
      <p class="auth-subtitle">¿No tienes cuenta? <a routerLink="/register">Regístrate gratis</a></p>

      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" autocomplete="email"/>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>

        <button type="submit" class="btn-submit" [disabled]="loading">
          {{ loading ? 'Iniciando sesión...' : 'Iniciar sesión' }}
        </button>

        <a routerLink="/forgot-password" class="forgot-link">¿Olvidaste tu contraseña?</a>
      </form>

      <div class="divider">
        <span>o</span>
      </div>

      <button class="btn-google" (click)="loginWithGoogle()" [disabled]="googleLoading">
        <svg *ngIf="!googleLoading" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.079,8-11.303,8c-6.627,0-12-5.373-12-12s5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.952,4,4,12.952,4,24c0,11.049,8.952,20,20,20c11.049,0,20-8.951,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
          <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
          <path fill="#4CAF50" d="M24,28c-4.418,0-8.213-1.535-10.957-4.081l-6.285,4.817C8.505,33.852,15.787,40,24,40c6.282,0,11.537-2.917,14.936-7.309l-6.238-5.259C30.206,29.073,27.214,28,24,28z"/>
          <path fill="#1976D2" d="M43.611,20.083H24v8h11.303c-1.649,4.657-6.079,8-11.303,8c-6.627,0-12-5.373-12-12s5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4c6.282,0,11.537,2.917,14.936,7.309l6.238-5.259C43.862,5.35,44,3.041,44,0C44,0,44,0,43.611,20.083z"/>
        </svg>
        <span *ngIf="googleLoading" class="spinner"></span>
        {{ googleLoading ? 'Conectando...' : 'Continuar con Google' }}
      </button>
    </div>
  </div>
</div>
