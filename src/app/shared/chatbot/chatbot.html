<div class="chatbot">
  <!-- Botón flotante -->
  <button class="chat-toggle" (click)="toggleChat()">
    <svg *ngIf="!isOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
    </svg>
    <svg *ngIf="isOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>

  <!-- Ventana del chat -->
  <div class="chat-window" *ngIf="isOpen">
    <div class="chat-header">
      <div class="chat-avatar">FS</div>
      <div>
        <h4>Asistente FashionStore</h4>
        <span>En línea</span>
      </div>
    </div>

    <div class="chat-messages">
      <div *ngFor="let msg of messages" class="message" [class.user]="msg.role === 'user'" [class.bot]="msg.role === 'bot'">
        <p>{{ msg.text }}</p>
      </div>
      <div class="message bot" *ngIf="loading">
        <p class="typing">Escribiendo...</p>
      </div>
    </div>

    <div class="chat-input">
      <input
        type="text"
        [(ngModel)]="message"
        (keyup.enter)="sendMessage()"
        placeholder="Escribe tu mensaje..."
        [disabled]="loading"/>
      <button (click)="sendMessage()" [disabled]="loading">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
      </button>
    </div>
  </div>
</div>
